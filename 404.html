<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — Conecta UNSA</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family:'Inter',sans-serif; background:#f8f9fa; color:#2C3E50; display:flex; flex-direction:column; min-height:100vh; align-items:center; justify-content:center; }
    .btn-primary { background:#C0392B; color:white; padding:10px 24px; border-radius:8px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:8px; transition:background .2s; }
    .btn-primary:hover { background:#A93226; }
    .floating { animation: float 6s ease-in-out infinite; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
  </style>
</head>
<body>
  <div class="text-center px-4">
    <div class="floating text-9xl font-black mb-4" style="color:#C0392B; opacity: 0.1; line-height:1;">404</div>
    <div class="mb-6 relative z-10" style="margin-top:-60px;">
      <i class="ti ti-map-2" style="font-size: 80px; color:#C0392B;"></i>
    </div>
    <h1 class="text-3xl font-extrabold mb-3">Oops, te perdiste en el campus</h1>
    <p class="text-gray-500 mb-8 max-w-md mx-auto">La página que buscas no existe, fue movida a otra ubicación o no tienes los permisos para verla.</p>
    <a href="/" class="btn-primary">
      <i class="ti ti-home"></i> Volver al Inicio
    </a>
  </div>
</body>
</html>
